name: skill-checks

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - run: python scripts/validate_skill.py
      - run: python evaluation/eval-runner/runner.py evaluation/fixtures
      - run: python -m unittest discover -s evaluation/eval-runner/tests -p 'test_*.py'
      - run: python -m unittest discover -s starter-kit/verified-tool-agent/tests -p 'test_*.py'
