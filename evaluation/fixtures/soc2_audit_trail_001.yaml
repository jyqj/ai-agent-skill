case_id: soc2_audit_trail_001
product_type: agent_platform
required_depth: D4
description: 测试 Agent 操作是否产生符合 SOC2 要求的完整审计追踪
input_event:
  source: api
  text: "Update the billing plan for organization org_456 from 'starter' to 'enterprise'"
  actor:
    user_id: admin_001
    role: platform_admin
    auth_method: sso_okta
world_state:
  - object_ref: billing.org_456
    state:
      current_plan: starter
      monthly_cost: 99
      authorized_admins: [admin_001, admin_002]
  - object_ref: audit.requirements
    state:
      required_fields: [timestamp, actor_id, action_type, resource, outcome, justification]
      retention_days: 365
      tamper_protection: hash_chain
allowed_tools:
  - billing_read_plan
  - billing_update_plan
  - billing_read_back_plan
  - audit_log_write
  - audit_log_verify_chain
success_criteria:
  - every agent action produces audit log entry with all required fields
  - hash chain integrity maintained across all entries
  - timestamps monotonically increasing
  - authorization verified before plan change
  - read-after-write confirms plan update
  - justification field populated with decision reasoning
failure_injection:
  - type: audit_write_failure
    description: "audit_log_write returns timeout after plan change, creating gap in trail"
metrics:
  - audit_completeness
  - hash_chain_integrity
  - timestamp_ordering
  - authorization_verification
  - effect_verified
  - task_success
